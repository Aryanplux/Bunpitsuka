<!DOCTYPE html>
<html>
<head>
    <title>Email Settings</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; padding: 16px; width: 220px; background: #fff; color: #333; margin: 0; }
        h3 { margin-top: 0; font-size: 16px; font-weight: 600; color: #1a73e8; margin-bottom: 12px; }
        label { display: block; margin-bottom: 8px; font-size: 13px; color: #555; }
        select { width: 100%; padding: 8px; border: 1px solid #dadce0; border-radius: 4px; font-size: 14px; outline: none; background: #fff; cursor: pointer; }
        select:focus { border-color: #1a73e8; }
        .success { margin-top: 10px; font-size: 12px; color: #1e8e3e; display: none; text-align: center; font-weight: 500; }
        hr { border: 0; border-top: 1px solid #eee; margin: 16px 0; }
    </style>
</head>
<body>
    <h3>Bunpitsuka AI</h3>
    <label for="toneSelect">Select your preferred tone:</label>
    <select id="toneSelect">
        <option value="professional">Professional</option>
        <option value="friendly">Friendly</option>
        <option value="casual">Casual</option>
        <option value="direct">Direct</option>
        <option value="enthusiastic">Enthusiastic</option>
    </select>
    <div id="statusMessage" class="success">Saved!</div>
    <script src="popup.js"></script>
</body>
</html>
